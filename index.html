<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>~/vincent/profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <main class="content" id="content" aria-live="polite"></main>

      <aside class="sidebar" aria-label="File tree navigation">
        <div class="lang-tabs" role="group" aria-label="Language">
          <button type="button" class="lang-btn" data-lang="en">EN</button
          ><button type="button" class="lang-btn" data-lang="ko">KO</button>
        </div>
        <div class="sidebar-header">
          <span class="prompt">$</span>
          <span class="cmd">tree</span>
          <span class="arg">~/vincent/profile</span>
        </div>
        <nav class="tree" id="tree"></nav>
        <div class="tree-summary" id="treeSummary"></div>
      </aside>
    </div>

    <footer class="statusbar" id="statusbar">
      <span class="sb-mode">NORMAL</span>
      <span class="sb-file" id="sbFile">about/README.md</span>
      <span class="sb-spacer"></span>
      <span class="sb-info" id="sbInfo">markdown</span>
      <span class="sb-info">utf-8</span>
      <span class="sb-info">~/vincent</span>
    </footer>

    <script src="index.js"></script>
  </body>
</html>
